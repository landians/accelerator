global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: otel-exported-metrics
    static_configs:
      - targets: ["otel-collector:8889"]

  # If your app exposes prometheus metrics on host, keep this target.
  # On macOS/Windows Docker Desktop, host.docker.internal works out-of-box.
  - job_name: accelerator-app
    static_configs:
      - targets: ["host.docker.internal:9464"]
